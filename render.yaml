services:
  - type: web
    name: forth-architecture
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build:prod
    startCommand: pnpm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: forth-architecture-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: fortharchitecture
      - key: ADMIN_PASSWORD
        value: Fortharcitecture@12

databases:
  - name: forth-architecture-db
    plan: free
    region: oregon
