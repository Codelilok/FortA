kind = "web"
previewPath = "/"
title = "Forth Architecture"
version = "1.0.0"
id = "artifacts/forth-architecture"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25455

[services.development]
run = "pnpm --filter @workspace/forth-architecture run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/forth-architecture", "run", "build" ]
publicDir = "artifacts/forth-architecture/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25455"
BASE_PATH = "/"
